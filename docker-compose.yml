services:
  postgres-db:
    image: postgres:15
    environment:
      POSTGRES_USER: alertuser
      POSTGRES_PASSWORD: alertpassword
      POSTGRES_DB: alertdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  subscription-service:
    build: 
      context: .
      dockerfile: subscription-service/Dockerfile
    ports:
      - "8081:8081"
    depends_on:
      - postgres-db
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres-db:5432/alertdb
      - QUARKUS_DATASOURCE_USERNAME=alertuser
      - QUARKUS_DATASOURCE_PASSWORD=alertpassword

  alert-service:
    build:
      context: .
      dockerfile: alert-service/Dockerfile
    ports:
      - "8082:8082"
    depends_on:
      - postgres-db
    environment:
      - QUARKUS_DATASOURCE_JDBC_URL=jdbc:postgresql://postgres-db:5432/alertdb
      - QUARKUS_DATASOURCE_USERNAME=alertuser
      - QUARKUS_DATASOURCE_PASSWORD=alertpassword

  stock-service:
    build: 
      context: .
      dockerfile: stock-service/Dockerfile
    environment:
      - ALPHAVANTAGE_API_KEY=${ALPHAVANTAGE_API_KEY}
    ports:
      - "8083:8083"

  currency-service:
    build: 
      context: .
      dockerfile: currency-service/Dockerfile
    ports:
      - "8084:8084"

  stock-subscription-service:
    build: 
      context: .
      dockerfile: stock-subscription-service/Dockerfile
    depends_on:
      - subscription-service
      - alert-service
      - stock-service
      - currency-service
    ports:
      - "8085:8085"

volumes:
  pgdata: